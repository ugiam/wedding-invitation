<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Invitation</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      text-align: center;
      background: #fdf6f0;
      margin: 0;
      padding: 0;
    }
    .container {
      padding: 40px 20px;
    }
    h1 {
      font-size: 32px;
      color: #8b5e3c;
    }
    h2 {
      font-size: 24px;
    }
    p {
      font-size: 18px;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      max-width: 500px;
      margin: auto;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #8b5e3c;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }
    #countdown {
      font-size: 20px;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1 id="guestName">Dear Guest</h1>
      <h2>You're Invited!</h2>
      <p>To the wedding of</p>
      <h2>Andi & Siti</h2>
      <p>Saturday, 10 August 2026</p>
      <p>Bandung, Indonesia</p>

      <div id="countdown"></div>

      <a class="btn" href="https://maps.google.com" target="_blank">View Location</a>
    </div>
  </div>

  <audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
  </audio>

  <script>
    // Get guest name from URL
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");
    if (name) {
      document.getElementById("guestName").innerText = "Dear " + decodeURIComponent(name);
    }

    // Countdown Timer
    const weddingDate = new Date("August 10, 2026 10:00:00").getTime();
    const countdownEl = document.getElementById("countdown");

    setInterval(() => {
      const now = new Date().getTime();
      const distance = weddingDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

      countdownEl.innerHTML = `${days} days ${hours} hours ${minutes} minutes`;
    }, 1000);
  </script>
</body>
</html>
