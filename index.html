<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Undangan Pernikahan</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      color: #fff;
      min-height: 100svh; /* better mobile height */
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      text-align: center;
      position: relative;
    }

    /* Background image (blur + zoom for nicer effect) */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url('1.jpg') center/cover no-repeat;
      filter: blur(8px);
      transform: scale(1.1);
      z-index: -2;
    }

    /* Dark overlay */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: -1;
    }

    .container {
      width: 90%;
      max-width: 420px; /* mobile-friendly */
      padding: 40px 20px;
    }

    .top-text {
      font-size: 11px;
      letter-spacing: 3px;
      margin-bottom: 30px;
    }

    .names {
      font-family: 'Great Vibes', cursive;
      font-size: 44px;
      margin: 10px 0;
    }

    .heart {
      font-size: 18px;
      margin: 10px 0;
    }

    .date {
      font-size: 11px;
      letter-spacing: 2px;
      margin-bottom: 70px;
    }

    .guest-title {
      font-size: 12px;
      margin-bottom: 5px;
    }

    .guest-name {
      font-size: 16px;
      margin-bottom: 20px;
    }

    .bottom-text {
      font-size: 12px;
      line-height: 1.8;
      letter-spacing: 1px;
    }

    /* Make it feel like mobile vertical card */
    @media (min-width: 768px) {
      .container {
        max-width: 480px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="top-text">WE INVITE YOU TO CELEBRATE OUR WEDDING</div>

    <div class="names">feby & ugi</div>

    <div class="heart">♥</div>

    <div class="date">MINGGU, 31 MEI 2026</div>

    <div class="guest-title">Yth. Bapak/Ibu/Saudara/i</div>

    <div id="guestName" class="guest-name">Guest Name</div>

    <div class="bottom-text">
      tanpa mengurangi rasa hormat, kami mengundang anda<br>
      untuk menghadiri acara pernikahan kami.
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");

    if (name) {
      document.getElementById("guestName").innerText = decodeURIComponent(name);
    }
  </script>
</body>
</html>
