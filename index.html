<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Undangan Pernikahan</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;500&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      color: #fff;
      min-height: 100svh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url('1.jpg') center/cover no-repeat;
      filter: blur(8px);
      transform: scale(1.1);
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: -1;
    }

    section {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
      padding: 40px 20px;
    }

    .top-text { font-size: 12px; letter-spacing: 3px; }
    .names { font-family: 'Great Vibes', cursive; font-size: 48px; }
    .date { font-family: 'Playfair Display', serif; font-size: 13px; }

    .guest-name { font-family: 'Playfair Display', serif; font-size: 18px; }

    .middle {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 20px 0;
    }

    .btn {
      padding: 12px 28px;
      border: 1px solid #fff;
      color: #fff;
      background: transparent;
      font-size: 14px;
      letter-spacing: 2px;
      border-radius: 30px;
      cursor: pointer;
    }

    .next-section { justify-content: center; }

    .music-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- PAGE 1 -->
  <section id="page1">
    <div>
      <div class="top-text">
        WE INVITE YOU TO CELEBRATE<br>
        OUR WEDDING<br>
      </div>
      <div class="names">feby & ugi</div>
      <div>♥</div>
      <div class="date">MINGGU, 31 MEI 2026</div>
    </div>

    <!-- BUTTON IN MIDDLE -->
    <div class="middle">
      <button class="btn" onclick="openInvitation()">BUKA UNDANGAN</button>
    </div>

    <div>
      <div>Yth. Bapak/Ibu/Saudara/i</div>
      <div id="guestName" class="guest-name">Guest Name</div>
      <div>
        tanpa mengurangi rasa hormat,<br>
        kami mengundang anda<br>
        untuk menghadiri acara pernikahan kami.
      </div>
    </div>
  </section>

  <!-- PAGE 2 -->
  <section class="next-section" id="page2">
    <div>
      <h2 style="font-family: Playfair Display; font-weight:400;">Save The Date</h2>
      <p>Minggu, 31 Mei 2026</p>
    </div>
  </section>

  <!-- MUSIC -->
  <audio id="music" loop>
    <source src="music.mp3" type="audio/mp3">
  </audio>

  <button class="music-btn" onclick="toggleMusic()">♪</button>

  <script>
    // Guest name
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");
    if (name) {
      document.getElementById("guestName").innerText = decodeURIComponent(name);
    }

    function openInvitation() {
      // remove page 1
      document.getElementById("page1").remove();

      // scroll to page 2
      document.getElementById("page2").scrollIntoView();

      // play music
      document.getElementById("music").play();

      // block back
      history.pushState(null, null, location.href);
      window.onpopstate = function () {
        history.go(1);
      };
    }

    function toggleMusic() {
      const music = document.getElementById("music");
      if (music.paused) music.play(); else music.pause();
    }
  </script>

</body>
</html>
